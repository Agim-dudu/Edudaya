<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Edudaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Palet Sasirangan Kalimantan Selatan
                        kuning: {
                            DEFAULT: '#F5A623',
                            light: '#FEF3DB',
                            dark: '#C47D0E'
                        },
                        merah: {
                            DEFAULT: '#C0392B',
                            light: '#FDECEA',
                            dark: '#922B21'
                        },
                        hijau: {
                            DEFAULT: '#27AE60',
                            light: '#E8F8F0',
                            dark: '#1E8449'
                        },
                        biru: {
                            DEFAULT: '#2980B9',
                            light: '#EAF4FB',
                            dark: '#1A5276'
                        },
                        ungu: {
                            DEFAULT: '#8E44AD',
                            light: '#F5EEF8',
                            dark: '#6C3483'
                        },
                        cokelat: {
                            DEFAULT: '#6D4C41',
                            light: '#EFEBE9',
                            dark: '#4E342E'
                        },
                        krem: {
                            DEFAULT: '#FFF8EE',
                            dark: '#F5E6CC'
                        },
                    },
                    fontFamily: {
                        nunito: ['Nunito', 'sans-serif'],
                        fredoka: ['Fredoka One', 'cursive'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* ===== GLOBAL ===== */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #FFF8EE;
        }

        .page {
            display: none;
            min-height: 100vh;
        }

        .page.active {
            display: block;
        }

        /* ===== SASIRANGAN PATTERN ===== */
        .sasirangan-bg {
            background-color: #FFF8EE;
            background-image:
                repeating-linear-gradient(45deg, rgba(245, 166, 35, 0.08) 0px, rgba(245, 166, 35, 0.08) 2px, transparent 2px, transparent 20px),
                repeating-linear-gradient(-45deg, rgba(192, 57, 43, 0.06) 0px, rgba(192, 57, 43, 0.06) 2px, transparent 2px, transparent 20px);
        }

        .sasirangan-header {
            background: linear-gradient(135deg, #C0392B 0%, #8E44AD 50%, #2980B9 100%);
            position: relative;
            overflow: hidden;
        }

        .sasirangan-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 0, rgba(255, 255, 255, 0.05) 2px, transparent 2px, transparent 16px),
                repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.05) 0, rgba(255, 255, 255, 0.05) 2px, transparent 2px, transparent 16px);
        }

        .motif-border {
            border-image: repeating-linear-gradient(90deg, #C0392B, #F5A623 20px, #27AE60 40px, #2980B9 60px, #8E44AD 80px, #C0392B 100px) 4;
            border-style: solid;
            border-width: 4px;
        }

        .motif-strip {
            height: 8px;
            background: repeating-linear-gradient(90deg, #C0392B 0px, #C0392B 16px, #F5A623 16px, #F5A623 32px, #27AE60 32px, #27AE60 48px, #2980B9 48px, #2980B9 64px, #8E44AD 64px, #8E44AD 80px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            min-height: 100vh;
        }

        .sidebar-link {
            transition: all 0.2s;
        }

        .sidebar-link:hover {
            transform: translateX(4px);
        }

        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid #F5A623;
        }

        /* ===== CARDS ===== */
        .card-hover {
            transition: all 0.25s;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        /* ===== BUBBLES DECORATION ===== */
        .bubble-dec {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            pointer-events: none;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(-3deg)
            }

            50% {
                transform: rotate(3deg)
            }
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.5)
            }

            100% {
                box-shadow: 0 0 0 16px rgba(245, 166, 35, 0)
            }
        }

        .float-anim {
            animation: float 3s ease-in-out infinite;
        }

        .wiggle-anim {
            animation: wiggle 2s ease-in-out infinite;
        }

        .pulse-anim {
            animation: pulse-ring 1.5s ease-out infinite;
        }

        /* ===== DECODING GAME ===== */
        .decode-card {
            perspective: 600px;
        }

        .decode-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .decode-card.flipped .decode-inner {
            transform: rotateY(180deg);
        }

        .decode-front,
        .decode-back {
            backface-visibility: hidden;
            position: absolute;
            inset: 0;
        }

        .decode-back {
            transform: rotateY(180deg);
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar {
            height: 14px;
            border-radius: 99px;
            overflow: hidden;
            background: #E5E7EB;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #27AE60, #F5A623);
            transition: width 0.5s ease;
        }

        /* ===== QUIZ ===== */
        .quiz-option {
            transition: all 0.2s;
            cursor: pointer;
        }

        .quiz-option:hover {
            transform: scale(1.02);
        }

        .quiz-option.correct {
            background: #E8F8F0 !important;
            border-color: #27AE60 !important;
        }

        .quiz-option.wrong {
            background: #FDECEA !important;
            border-color: #C0392B !important;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #C0392B;
            border-radius: 99px;
        }

        ::-webkit-scrollbar-track {
            background: #FFF8EE;
        }

        /* nav tab */
        .tab-btn {
            transition: all 0.2s;
        }

        .tab-btn.active {
            border-bottom: 3px solid #C0392B;
            color: #C0392B;
            font-weight: 800;
        }

        /* input focus */
        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #F5A623;
            outline-offset: 2px;
        }

        /* badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body class="sasirangan-bg">

    <!-- ============================================================ -->
    <!-- 1. LOGIN SISWA                                               -->
    <!-- ============================================================ -->
    <div id="login-siswa" class="page active">
        <div class="min-h-screen flex">
            <!-- Left panel -->
            <div class="hidden lg:flex flex-col justify-center items-center w-1/2 sasirangan-header p-12 relative">
                <div class="bubble-dec w-64 h-64 bg-kuning-DEFAULT top-[-32px] left-[-32px]"></div>
                <div class="bubble-dec w-40 h-40 bg-biru-DEFAULT bottom-16 right-[-20px]"></div>
                <div class="relative z-10 text-center">
                    <div class="float-anim inline-block mb-6">
                        <div
                            class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center text-7xl shadow-2xl">
                            🦅</div>
                    </div>
                    <h1 class="font-fredoka text-5xl text-white leading-tight mb-3">Edudaya.id</h1>
                    <p class="text-white/80 text-lg font-nunito font-600">Belajar Numerasi dengan Kearifan
                        Lokal<br>Kalimantan Selatan</p>
                    <div class="motif-strip rounded-full mt-8 w-48 mx-auto opacity-70"></div>
                </div>
            </div>
            <!-- Right panel -->
            <div class="flex-1 flex flex-col justify-center items-center p-8">
                <div class="w-full max-w-md">
                    <div class="motif-strip rounded-t-2xl"></div>
                    <div class="bg-white rounded-b-2xl shadow-xl p-8">
                        <div class="text-center mb-8">
                            <span class="text-5xl">👧</span>
                            <h2 class="font-fredoka text-3xl text-cokelat-DEFAULT mt-2">Masuk sebagai Siswa</h2>
                            <p class="text-gray-500 text-sm mt-1">Hayo, siap belajar hari ini?</p>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-700 text-cokelat-DEFAULT mb-1">Username</label>
                                <input type="text" placeholder="Masukkan Username"
                                    class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 font-nunito text-base focus:border-kuning-DEFAULT transition">
                            </div>
                            <div>
                                <label class="block text-sm font-700 text-cokelat-DEFAULT mb-1">Password</label>
                                <input type="password" placeholder="Password"
                                    class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 font-nunito text-base focus:border-kuning-DEFAULT transition">
                            </div>
                            <button onclick="showPage('home')"
                                class="w-full bg-yellow-300 hover:bg-kuning-dark text-white font-800 py-3 rounded-xl text-lg shadow-md transition hover:-translate-y-0.5 active:translate-y-0">
                                🚀 Mulai Belajar!
                            </button>
                        </div>
                        <div class="mt-6 flex gap-2 justify-center">
                            <button onclick="showPage('login-guru')"
                                class="text-sm text-biru-DEFAULT hover:underline font-600">Login Guru</button>
                            <span class="text-gray-300">|</span>
                            <button onclick="showPage('login-admin')"
                                class="text-sm text-merah-DEFAULT hover:underline font-600">Login Admin</button>
                            <span class="text-gray-300">|</span>
                            <a href="/register"
                                class="text-sm text-hijau-DEFAULT hover:underline font-600">Daftar</a>
                        </div>
                    </div>
                    <p class="text-center text-xs text-gray-400 mt-4">© 2024 Edudaya.id — Numerasi Berbasis Budaya
                        Kalimantan Selatan</p>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
